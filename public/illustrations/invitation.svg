  <path d="M170 140 C170 135, 175 135, 175 140 C175 135, 180 135, 180 140 Q175 150, 170 140 Z" fill="#B5A08A" fill-opacity="0.4"/>
  
  <!-- Text lines -->
  <line x1="100" y1="180" x2="200" y2="180" stroke="#B5A08A" stroke-width="2" opacity="0.6"/>
  <line x1="100" y1="200" x2="180" y2="200" stroke="#B5A08A" stroke-width="2" opacity="0.6"/>
  <line x1="100" y1="220" x2="190" y2="220" stroke="#B5A08A" stroke-width="2" opacity="0.6"/>
